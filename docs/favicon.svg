<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Blue/Cyan Bracket Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Rounded Background Box -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8" />

  <!-- Background Decorative Bracket Curves (Sleek abstract soccer/bracket path) -->
  <path d="M 96,256 C 96,160 160,96 256,96 M 416,256 C 416,160 356,96 256,96" 
        fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linecap="round" opacity="0.3" />
        
  <path d="M 70,256 C 70,350 160,416 256,416 M 442,256 C 442,350 352,416 256,416" 
        fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linecap="round" opacity="0.3" />

  <!-- Outer Glowing Aura -->
  <circle cx="256" cy="230" r="100" fill="#f59e0b" opacity="0.08" filter="url(#glow)" />

  <!-- Main Premium Trophy Icon -->
  <g transform="translate(136, 100) scale(0.95)" filter="url(#glow)">
    <!-- Trophy Cup Rim / Glow Accent -->
    <ellipse cx="126" cy="30" rx="60" ry="12" fill="none" stroke="url(#goldGrad)" stroke-width="6" />
    
    <!-- Left Handle -->
    <path d="M 66,50 C 10,50 10,130 66,130" fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round" />
    <!-- Right Handle -->
    <path d="M 186,50 C 242,50 242,130 186,130" fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round" />

    <!-- Main Cup Body -->
    <path d="M 66,30 
             C 66,140 86,180 126,180 
             C 166,180 186,140 186,30 Z" 
          fill="url(#goldGrad)" />
          
    <!-- Cup Inner Depth Shading -->
    <path d="M 68,36 C 90,44 162,44 184,36 C 184,36 172,130 126,130 C 80,130 68,36 68,36 Z" fill="#78350f" opacity="0.4" />

    <!-- Trophy Stem / Neck -->
    <path d="M 106,178 L 146,178 L 138,220 L 114,220 Z" fill="url(#goldGrad)" />
    
    <!-- Trophy Base Pedestal (3 Stacked steps) -->
    <!-- Base Step 1 -->
    <path d="M 86,220 L 166,220 L 176,236 L 76,236 Z" fill="url(#goldGrad)" opacity="0.9" />
    <!-- Base Step 2 -->
    <rect x="66" y="236" width="120" height="18" rx="4" fill="url(#goldGrad)" />
    <!-- Base Step 3 (Darker Bottom Plinth) -->
    <rect x="46" y="254" width="160" height="26" rx="6" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="6" />
    
    <!-- Crown Overlay at center of cup -->
    <path d="M 111,80 L 116,98 L 126,86 L 136,98 L 141,80 L 133,110 L 119,110 Z" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- Dynamic Bracket Intersection Star (Vibrant Predictor Logo Sparkle) -->
  <path d="M 256,42 L 262,62 L 282,62 L 266,74 L 272,94 L 256,82 L 240,94 L 246,74 L 230,62 L 250,62 Z" 
        fill="#22d3ee" filter="url(#glow)" />
</svg>